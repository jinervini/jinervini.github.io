<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025 트레이딩 일지</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e28;
  --border:#252a38;--border2:#2e3447;
  --text:#e8eaf0;--text2:#8890a8;--text3:#555e78;
  --green:#22c97a;--green-bg:#0d2b1f;--green-b:#16895240;
  --red:#f05a5a;--red-bg:#2b0d0d;--red-b:#8b202040;
  --amber:#f5a623;--amber-bg:#2b1f0d;--amber-b:#f5a62340;
  --blue:#5b8af0;--blue-bg:#0d1a2b;--blue-b:#5b8af030;
  --purple:#a78bf5;--purple-bg:#1a1228;--purple-b:#a78bf530;
  --mono:'DM Mono',monospace;--sans:'Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
body{max-width:1350px;margin:0 auto;padding:0 24px 80px;}

/* Header */
.site-header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 24px;border-bottom:1px solid var(--border);margin-bottom:28px;}
.logo{display:flex;align-items:baseline;gap:10px;}
.logo-mark{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--green);letter-spacing:.08em;background:var(--green-bg);padding:4px 10px;border-radius:4px;border:1px solid var(--green-b);}
.logo-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.02em;}
.header-right{display:flex;align-items:center;gap:14px;}
.price-status{font-family:var(--mono);font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;}
.pdot.stale{background:var(--amber);}
.pdot.err{background:var(--red);}

/* Nav */
.nav{display:flex;gap:4px;margin-bottom:28px;border-bottom:1px solid var(--border);}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:500;padding:10px 20px;cursor:pointer;transition:all .2s;margin-bottom:-1px;}
.nav-btn:hover{color:var(--text);}
.nav-btn.active{color:var(--green);border-bottom-color:var(--green);}

.page{display:none;}
.page.active{display:block;}

/* Month tabs */
.month-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px;}
.mtab{font-family:var(--mono);font-size:11px;padding:5px 12px;background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:4px;cursor:pointer;transition:all .15s;font-weight:500;}
.mtab:hover{border-color:var(--border2);color:var(--text);}
.mtab.active{background:var(--green-bg);border-color:#16895260;color:var(--green);}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-size:12px;font-weight:500;font-family:var(--sans);border-radius:6px;cursor:pointer;transition:all .15s;border:1px solid;}
.btn-green{background:var(--green-bg);border-color:var(--green-b);color:var(--green);}
.btn-green:hover{background:#16522a80;}
.btn-blue{background:var(--blue-bg);border-color:var(--blue-b);color:var(--blue);}
.btn-blue:hover{background:#162040;}
.btn-blue.loading{opacity:.5;pointer-events:none;}
.btn-ghost{background:none;border-color:var(--border);color:var(--text2);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);}
.btn-danger{background:none;border-color:var(--red-b);color:var(--red);}
.btn-save{padding:7px 18px;font-size:12px;font-weight:500;font-family:var(--sans);background:var(--green);color:#000;border:none;border-radius:5px;cursor:pointer;}
.btn-cancel-sm{padding:7px 14px;font-size:12px;font-family:var(--sans);background:none;border:1px solid var(--border2);color:var(--text2);border-radius:5px;cursor:pointer;}
.btn-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:0 2px;}
.btn-del:hover{color:var(--red);}

/* Stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 18px;}
.s-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:8px;}
.s-value{font-family:var(--mono);font-size:22px;font-weight:500;}
.s-sub{font-size:11px;color:var(--text3);margin-top:4px;}

/* Benchmark cards */
.bench-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.bench-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 18px;}
.bench-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
.bench-name{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px;}
.bench-value{font-family:var(--mono);font-size:28px;font-weight:500;}
.bench-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.bench-bar-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden;}
.bench-bar{height:100%;border-radius:2px;}

/* Portfolio holdings table */
.section-title{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:12px;margin-top:24px;}
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap;}
th{text-align:left;padding:9px 14px;font-family:var(--mono);font-size:9px;font-weight:500;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;background:var(--bg);border-bottom:1px solid var(--border);}
td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--text);}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surface2);}
.mono{font-family:var(--mono);font-size:12px;}
.pos{color:var(--green);}
.neg{color:var(--red);}
.muted{color:var(--text3);}

/* Stock cards */
.stock-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;transition:border-color .2s;}
.stock-card:hover{border-color:var(--border2);}
.stock-card.expanded{border-color:var(--border2);}
.card-header{display:flex;align-items:center;padding:16px 20px;cursor:pointer;gap:16px;flex-wrap:wrap;}
.card-ticker{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);letter-spacing:.05em;min-width:100px;}
.card-ticker-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
.card-meta{display:flex;align-items:center;gap:18px;flex:1;flex-wrap:wrap;}
.meta-item{display:flex;flex-direction:column;gap:2px;}
.meta-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.meta-value{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text);}
.meta-value.pos{color:var(--green);}
.meta-value.neg{color:var(--red);}
.progress-bar-wrap{min-width:130px;flex:1;}
.progress-label{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:5px;}
.progress-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s;}
.progress-fill.over{background:var(--amber);}
.card-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500;font-family:var(--mono);}
.badge-hold{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b);}
.badge-closed{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.badge-win{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b);}
.badge-loss{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b);}
.badge-target{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b);}
.badge-stop{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b);}
.badge-near-target{background:#1a2b1a;color:#8fd4a8;border:1px solid #22c97a30;}
.badge-near-stop{background:#2b1a1a;color:#d48f8f;border:1px solid #f05a5a30;}
.chevron{font-size:14px;color:var(--text3);transition:transform .2s;display:inline-block;}
.market-toggle{display:flex;gap:0;margin-bottom:18px;border:1px solid var(--border2);border-radius:7px;overflow:hidden;width:fit-content;}
.mkt-btn{padding:9px 22px;font-size:13px;font-weight:500;font-family:var(--sans);background:none;border:none;color:var(--text3);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px;}
.mkt-btn.active{background:var(--surface2);color:var(--text);}
.mkt-btn.active.us{color:var(--blue);}
.mkt-btn.active.kr{color:var(--amber);}
.expanded .chevron{transform:rotate(180deg);}

/* Card detail */
.card-detail{display:none;border-top:1px solid var(--border);}
.expanded .card-detail{display:block;}
.detail-toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 10px;flex-wrap:wrap;gap:8px;}
.detail-title{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.reason-box{margin:0 20px 12px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text2);line-height:1.6;}
.reason-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.levels-row{display:flex;gap:12px;margin:0 20px 12px;flex-wrap:wrap;}
.level-item{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;}
.level-dot{width:8px;height:8px;border-radius:50%;}

/* Forms */
.new-stock-form{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px;display:none;}
.new-stock-form.open{display:block;}
.form-section{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin:14px 0 10px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:14px;}
.form-grid-wide{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.ff{display:flex;flex-direction:column;gap:4px;}
.ff label{font-size:9px;font-weight:500;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;}
.ff input,.ff select,.ff textarea{background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 10px;border-radius:5px;width:100%;transition:border-color .15s;}
.ff input:focus,.ff textarea:focus{outline:none;border-color:var(--green);}
.ff input::placeholder,.ff textarea::placeholder{color:var(--text3);}
.ff textarea{resize:vertical;min-height:60px;font-family:var(--sans);font-size:12px;}
.form-hint{font-size:10px;color:var(--text3);margin-top:3px;}
.form-actions{display:flex;gap:8px;justify-content:flex-end;}
.add-buy-form{background:var(--bg);border-top:1px solid var(--border);padding:16px 20px;display:none;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}

/* Chart */
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:24px;}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.chart-title{font-family:var(--mono);font-size:11px;color:var(--text2);letter-spacing:.08em;}

/* Action bar */
.action-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.action-left{display:flex;align-items:center;gap:10px;}
.month-label{font-size:15px;font-weight:700;color:var(--text);}

/* Empty */
.empty{text-align:center;padding:48px;color:var(--text3);font-size:13px;}
.empty-icon{display:block;font-size:28px;margin-bottom:10px;}

/* Toast */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:10px 20px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}

@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.price-loading{font-size:11px;color:var(--text3);animation:pulse 1s infinite;}
.ticker-wrap{position:relative;}
.dd-box{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;z-index:200;margin-top:4px;overflow:hidden;display:none;box-shadow:0 4px 20px #00000040;}
.dd-item{padding:9px 14px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;transition:background .1s;}
.dd-item:hover{background:var(--border);}
.dd-code{font-family:var(--mono);font-size:11px;color:var(--text3);}
.dd-loading{padding:10px 14px;font-size:12px;color:var(--text3);font-family:var(--mono);animation:pulse 1s infinite;}
.code-tag{display:inline-block;font-family:var(--mono);font-size:10px;color:var(--blue);background:var(--blue-bg);padding:2px 8px;border-radius:4px;margin-top:4px;}
.bench-month-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px 20px;}
.bmc-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
.bmc-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:12px;}
.bmc-dates{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:8px;}
.bmc-arrow{color:var(--border2);}
.bmc-prices{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;}
.bmc-start{font-family:var(--mono);font-size:14px;color:var(--text2);}
.bmc-end{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text);}
.bmc-pct{font-family:var(--mono);font-size:20px;font-weight:500;margin-top:4px;}
.bmc-bar-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden;}
.bmc-bar{height:100%;border-radius:2px;transition:width .6s;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">
    <span class="logo-mark">TRADE</span>
    <span class="logo-title">트레이딩 일지</span>
  </div>
  <div class="header-right">
    <span class="price-status" id="price-status">
      <span class="pdot stale" id="pdot"></span>
      <span id="ptext">가격 미조회</span>
    </span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--text3)">2025</span>
  </div>
</header>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('portfolio',this)">포트폴리오</button>
  <button class="nav-btn" onclick="showPage('log',this)">거래 내역</button>
  <button class="nav-btn" onclick="showPage('summary',this)">월간 결과</button>
</nav>

<!-- ===== 포트폴리오 ===== -->
<div class="page active" id="page-portfolio">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div style="font-family:var(--mono);font-size:11px;color:var(--text3)">전체 포트폴리오 현황 · 2025</div>
    <button class="btn btn-blue" id="refresh-btn2" onclick="refreshAllPrices()">↻ 종가 업데이트</button>
  </div>
  <div class="stat-grid" id="port-stat-grid"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;align-items:start">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px">
      <div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px">포트폴리오 비중</div>
      <canvas id="port-chart" height="240"></canvas>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px">
      <div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px">종목별 비중</div>
      <div id="port-legend" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>
  </div>
  <div class="section-title">보유 종목</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>종목</th><th>평단가</th><th>현재가</th><th>투자금</th><th>평가금</th><th>미실현 손익</th><th>수익률</th><th>목표가</th><th>손절가</th><th>상태</th></tr></thead>
      <tbody id="port-holdings-body"></tbody>
    </table>
  </div>
</div>

<!-- ===== 거래 내역 ===== -->
<div class="page" id="page-log">
  <div class="month-tabs" id="month-tabs"></div>
  <div class="action-bar">
    <div class="action-left">
      <span class="month-label" id="month-label"></span>
      <button class="btn btn-blue" id="refresh-btn" onclick="refreshPrices()">↻ 종가 업데이트</button>
    </div>
    <button class="btn btn-green" onclick="openNewStock()">＋ 종목 추가</button>
  </div>

  <div class="new-stock-form" id="new-stock-form">
    <div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px">새 종목 추가</div>
    <div class="market-toggle">
      <button type="button" class="mkt-btn active us" id="mb-us" onclick="setMarket('US')">🇺🇸 미국 주식</button>
      <button type="button" class="mkt-btn kr" id="mb-kr" onclick="setMarket('KR')">🇰🇷 한국 주식</button>
    </div>
    <div class="form-section">기본 정보</div>
    <div class="form-grid">
      <div class="ff">
        <label>종목 티커</label>
        <input type="text" id="ns-ticker" placeholder="AAPL, TSLA, NVDA" style="text-transform:uppercase">
        <div class="form-hint" id="ns-ticker-hint">종목명 입력 시 자동완성 | 안 되면 6자리 코드 직접 입력</div>
      </div>
      <div class="ff"><label>목표 투자금액 (원)</label><input type="number" id="ns-target" placeholder="2,000,000" oninput="fmtInput(this)"></div>
      <div class="ff"><label id="ns-tprice-label">목표 수익률 (%)</label><input type="number" id="ns-tprice" placeholder="15" step="0.1" min="0"></div>
      <div class="ff"><label id="ns-stop-label">손절 하락률 (%)</label><input type="number" id="ns-stop" placeholder="8" step="0.1" min="0"></div>
    </div>
    <div class="form-section">1차 매수</div>
    <div class="form-grid">
      <div class="ff"><label>매수일</label><input type="date" id="ns-date"></div>
      <div class="ff"><label id="ns-price-label">매수가 ($)</label><input type="number" id="ns-price" placeholder="0.00" step="0.01" oninput="calcNsAmt()"></div>
      <div class="ff"><label>수량 (주)</label><input type="number" id="ns-qty" placeholder="10" step="1" min="1" oninput="calcNsAmt()"></div>
      <div class="ff" id="ns-rate-wrap" style="display:none"><label>환율 (원/$)</label><input type="number" id="ns-rate" placeholder="1380" step="1" value="1380" oninput="calcNsAmt()"></div>
      <div class="ff"><label>매수금액 (자동계산)</label><div id="ns-amt-display" style="font-family:var(--mono);font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:5px;color:var(--text2);background:var(--surface2)">-</div></div>
    </div>
    <div class="form-section">투자 이유 / 메모</div>
    <div class="form-grid-wide">
      <div class="ff"><label>투자 이유 (나중에 복기용)</label><textarea id="ns-reason" placeholder="이 종목을 매수하는 이유를 기록해두세요..."></textarea></div>

async function doStockSearch(q){

    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(naverUrl)}`
  ];

    try{

// ─── 네이버 주가 조회 ─────────────────────────────────────────
async function fetchNaverPrice(code6){
  const url=`https://m.stock.naver.com/api/stock/${code6}/basic`;
  try{
    const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
    const d=await r.json();
    const raw=d.closePrice||d.stockPrice?.closePrice||'';
    const price=Number(String(raw).replace(/,/g,''));
    return price||null;
  }catch(e){return null;}
}

async function fetchPrice(ticker){
  ticker=ticker.toUpperCase();
  const cache=getPriceCache();
  const today=new Date().toISOString().slice(0,10);
  if(cache[ticker]&&cache[ticker].date===today) return cache[ticker].price;
  let price=null;
  if(isKR(ticker)){
    const code6=ticker.replace(/\.(KS|KQ)$/i,'');
    price=await fetchNaverPrice(code6);
    if(!price) price=await fetchYahooPrice(ticker); // 백업
  }else{
    price=await fetchFinnhubPrice(ticker);
  }
  if(price){const c=getPriceCache();c[ticker]={price,date:today};savePriceCache(c);}
  return price;
}

async function fetchFinnhubPrice(ticker){
  try{
    const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(ticker)}&token=${API_KEY}`);
    const d=await r.json();
    return d.c>0?d.c:(d.pc>0?d.pc:null);
  }catch(e){return null;}
}

async function fetchYahooPrice(ticker){
  const yUrl=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=5d`;
  // 1차: corsproxy.io (빠름)
  try{
    const r=await Promise.race([
      fetch(`https://corsproxy.io/?${encodeURIComponent(yUrl)}`),
      new Promise((_,rej)=>setTimeout(()=>rej('timeout'),5000))
    ]);
    if(r.ok){const d=await r.json();const p=d?.chart?.result?.[0]?.meta?.regularMarketPrice;if(p)return p;}
  }catch(e){}
  // 2차: allorigins 백업
  try{
    const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(yUrl)}`);
    const data=await r.json();
    const parsed=JSON.parse(data.contents);
    return parsed.chart.result[0].meta.regularMarketPrice||null;
  }catch(e){return null;}
}

async function doRefresh(btnId){
  const btn=document.getElementById(btnId);
  if(btn){btn.classList.add('loading');btn.textContent='조회중...';}
  const data=getData();
  const tickers=[...new Set(data.filter(s=>s.buys.some(b=>!b.sellPrice)&&s.market!=='KR').map(s=>s.ticker.toUpperCase()))]; // 전체 보유 미국주식
  if(!tickers.length){showToast('보유중인 종목이 없어요');if(btn){btn.classList.remove('loading');btn.textContent='↻ 종가 업데이트';}return;}
  const cache=getPriceCache();tickers.forEach(t=>{if(cache[t])delete cache[t];});savePriceCache(cache);
  let ok=0,fail=0;
  for(const tk of tickers){
    const price=await fetchPrice(tk);
    if(price){
      const d=getData();
      d.filter(s=>s.ticker.toUpperCase()===tk).forEach(s=>s.currentPrice=price);
      saveData(d);ok++;
    }else fail++;
    await new Promise(r=>setTimeout(r,350));
  }
  document.getElementById('pdot').className='pdot'+(fail>0?' stale':'');
  document.getElementById('ptext').textContent=`업데이트 · ${new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}`;
  showToast(fail?`${ok}개 성공, ${fail}개 실패`:`✓ ${ok}개 종목 종가 업데이트`);
  if(btn){btn.classList.remove('loading');btn.textContent='↻ 종가 업데이트';}
}

// ─── Portfolio Stats ──────────────────────────────────────────
function calcPortfolioStats(){
  const data=getData();
  let inv=0,val=0,realPnl=0;
  for(const s of data){
    for(const b of s.buys){
      const shares=b.qty||(b.amount/b.price);
      const rate=s.market==='KR'?1:(b.rate||1380);
      if(b.sellPrice){
        // 실현손익: qty×(매도가-매수가)×환율(원화로)
        realPnl+=shares*(Number(b.sellPrice)-b.price)*rate;
      }else{
        inv+=Number(b.amount); // amount는 이미 원화
        if(s.currentPrice) val+=shares*Number(s.currentPrice)*rate; // 평가금 원화
        else val+=Number(b.amount);
      }
    }
  }
  const unreal=val-inv;
  const unrealPct=inv?unreal/inv*100:0;
  return{inv,val,unreal,unrealPct,realPnl};
}

// ─── Calc helpers ─────────────────────────────────────────────
function calcAvgPrice(buys){
  const a=buys.filter(b=>!b.sellPrice);
  const ta=a.reduce((s,b)=>s+Number(b.amount),0);
  const ts=a.reduce((s,b)=>s+Number(b.amount)/Number(b.price),0);
  return ts?ta/ts:null;
}
function calcTotalInvested(buys){return buys.filter(b=>!b.sellPrice).reduce((s,b)=>s+Number(b.amount),0);}

function calcNsAmt(){
  const priceEl=document.getElementById('ns-price');
  const qtyEl=document.getElementById('ns-qty');
  const el=document.getElementById('ns-amt-display');
  if(!priceEl||!qtyEl||!el)return;
  const price=parseFloat(priceEl.value)||0;
  const qty=parseFloat(qtyEl.value)||0;
  const rateEl=document.getElementById('ns-rate');
  const rate=(formMarket==='KR')?1:(parseFloat(rateEl&&rateEl.value)||1380);
  const amt=price*qty*rate;
  if(amt>0){
    const usdRef=(formMarket!=='KR'&&price&&qty)?` ($${(price*qty).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})})`:'';
    el.textContent=Math.round(amt).toLocaleString('ko-KR')+'원'+usdRef;
    el.style.color='var(--text)';
  }else{el.textContent='-';el.style.color='var(--text2)';}
}
function setMarket(m){
  formMarket=m;
  document.getElementById('mb-us').classList.toggle('active',m==='US');
  document.getElementById('mb-us').classList.toggle('kr',false);
  document.getElementById('mb-kr').classList.toggle('active',m==='KR');
  document.getElementById('mb-us').classList.toggle('us',m==='US');
  const isKRMkt=m==='KR';
  document.getElementById('ns-ticker').placeholder=isKRMkt?'005930.KS, 035420.KS':'AAPL, TSLA, NVDA';
  document.getElementById('ns-ticker-hint').textContent=isKRMkt?'종목명 입력 시 자동완성 | 안 되면 6자리 코드 직접 입력':'미국: AAPL, TSLA, NVDA';
  const unit=isKRMkt?'(원)':'($)';

  document.getElementById('ns-tprice-label').textContent='목표 수익률 (%)';  // % 입력
  document.getElementById('ns-stop-label').textContent='손절 하락률 (%)';  // % 입력
  document.getElementById('ns-price').step=isKRMkt?'1':'0.01';
  document.getElementById('ns-tprice').step=isKRMkt?'1':'0.01';

  calcNsAmt();

function fmtInput(el){
  const raw=el.value.replace(/,/g,'');
  if(!isNaN(raw)&&raw!=='') el.dataset.raw=raw;
}
function saveNewStock(){
  const rawName=document.getElementById('ns-ticker').value.trim();
  const ticker=formMarket==='KR'?rawName:rawName.toUpperCase();
  const stockName=ticker;
  const date=document.getElementById('ns-date').value;
  const price=document.getElementById('ns-price').value;
  const qty=document.getElementById('ns-qty').value;
  if(!ticker||!date||!price||!qty){showToast('종목·날짜·매수가·수량은 필수입니다');return;}
  const month=parseInt(date.split('-')[1]);
  const data=getData();
  let stock=data.find(s=>s.ticker===ticker&&s.month===month);
  if(!stock){
    stock={id:uid(),month,ticker,stockName,market:formMarket,
      targetAmount:Number(document.getElementById('ns-target').value)||0,
      targetPct:document.getElementById('ns-tprice').value?Number(document.getElementById('ns-tprice').value):0,
      stopPct:document.getElementById('ns-stop').value?Number(document.getElementById('ns-stop').value):0,
      targetPrice:document.getElementById('ns-tprice').value?Number(price)*(1+Number(document.getElementById('ns-tprice').value)/100):'',
      stopLoss:document.getElementById('ns-stop').value?Number(price)*(1-Number(document.getElementById('ns-stop').value)/100):'',
      reason:document.getElementById('ns-reason').value,
      currentPrice:'',buys:[]};
    data.push(stock);
  }else{
    if(document.getElementById('ns-target').value) stock.targetAmount=Number(document.getElementById('ns-target').value);
    if(document.getElementById('ns-tprice').value){
      const _tp=Number(document.getElementById('ns-tprice').value);
      const _avg=calcAvgPrice(stock.buys)||Number(price);
      stock.targetPct=_tp;
      stock.targetPrice=_avg*(1+_tp/100);
    }
    if(document.getElementById('ns-stop').value){
      const _sp=Number(document.getElementById('ns-stop').value);
      const _avg2=calcAvgPrice(stock.buys)||Number(price);
      stock.stopPct=_sp;
      stock.stopLoss=_avg2*(1-_sp/100);
    }
    if(document.getElementById('ns-reason').value) stock.reason=document.getElementById('ns-reason').value;
  }
  const nsQty=Number(qty);
  const nsRateEl=document.getElementById('ns-rate');
  const nsRate=(formMarket==='KR')?1:(parseFloat(nsRateEl&&nsRateEl.value)||1380);
  const nsAmt=Number(price)*nsQty*nsRate;
  stock.buys.push({id:uid(),date,price:Number(price),qty:nsQty,amount:nsAmt,rate:nsRate,memo:document.getElementById('ns-memo').value,sellPrice:'',sellDate:''});
  saveData(data);
  closeNewStock();
  ['ns-ticker','ns-target','ns-tprice','ns-stop','ns-price','ns-qty','ns-memo','ns-reason'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const _disp=document.getElementById('ns-amt-display');if(_disp)_disp.textContent='-';
  selectedCode='';
  currentMonth=month;renderMonthTabs();renderStocks();
  fetchPrice(ticker).then(p=>{if(p){const d=getData();d.filter(s=>s.id===stock.id).forEach(s=>s.currentPrice=p);saveData(d);renderStocks();}});
}

// ─── Add buy ─────────────────────────────────────────────────
function openAddBuy(sid){
  const f=document.getElementById('abf-'+sid);
  if(!f)return;
  f.style.display=f.style.display==='block'?'none':'block';
  if(f.style.display==='block') f.querySelector('[data-field="date"]').value=new Date().toISOString().slice(0,10);
}
function calcAbfAmt(sid){
  const f=document.getElementById('abf-'+sid);
  if(!f)return;
  const price=parseFloat(f.querySelector('[data-field="price"]')?.value)||0;
  const qty=parseFloat(f.querySelector('[data-field="qty"]')?.value)||0;
  const amt=price*qty;
  const el=document.getElementById('abf-amt-'+sid);
  if(!el)return;
  const data=getData();const s=data.find(x=>x.id===sid);
  const mkt=s?s.market:'KR';
  if(amt>0){el.textContent=Math.round(amt).toLocaleString('ko-KR')+'원';el.style.color='var(--text)';}
  else{el.textContent='-';el.style.color='var(--text2)';}
}
function saveAddBuy(sid){
  const f=document.getElementById('abf-'+sid);
  const date=f.querySelector('[data-field="date"]').value;
  const price=f.querySelector('[data-field="price"]').value;
  const qtyVal=f.querySelector('[data-field="qty"]').value;
  if(!date||!price||!qtyVal){showToast('날짜·매수가·수량을 입력하세요');return;}
  const qty=Number(qtyVal);
  const data=getData();
  const stock=data.find(s=>s.id===sid);
  if(!stock)return;
  const rateInput=f.querySelector('[data-field="rate"]');
  const abfRate=rateInput?(parseFloat(rateInput.value)||1380):1;
  const abfFinalRate=(stock.market==='KR')?1:abfRate;
  const amount=Number(price)*qty*abfFinalRate;
  stock.buys.push({id:uid(),date,price:Number(price),qty,amount,memo:f.querySelector('[data-field="memo"]').value,sellPrice:'',sellDate:''});
  saveData(data);f.style.display='none';renderStocks();
}

// ─── Sell ─────────────────────────────────────────────────────
function openSell(sid,bid){
  const r=document.getElementById('sell-'+sid+'-'+bid);
  if(!r)return;
  const isOpening=r.style.display!=='table-row';
  r.style.display=isOpening?'table-row':'none';
  if(isOpening){
    const dateEl=document.getElementById('sd-'+sid+'-'+bid);
    if(dateEl&&!dateEl.value){
      dateEl.value=new Date().toISOString().slice(0,10);
    }
  }
}
function saveSell(sid,bid){
  const sp=document.getElementById('sp-'+sid+'-'+bid).value;
  const sd=document.getElementById('sd-'+sid+'-'+bid).value;
  if(!sp||!sd){showToast('매도가와 매도일을 입력하세요');return;}
  const data=getData();const stock=data.find(s=>s.id===sid);const buy=stock&&stock.buys.find(b=>b.id===bid);
  if(!buy)return;buy.sellPrice=Number(sp);buy.sellDate=sd;saveData(data);renderStocks();
}
function deleteBuy(sid,bid){
  if(!confirm('이 매수 내역을 삭제할까요?'))return;
  const data=getData();const stock=data.find(s=>s.id===sid);if(!stock)return;
  stock.buys=stock.buys.filter(b=>b.id!==bid);
  if(!stock.buys.length&&confirm('매수 내역이 없어 종목을 삭제합니다'))saveData(data.filter(s=>s.id!==sid));
  else saveData(data);renderStocks();
}
function deleteStock(sid,event){
  if(event){event.stopPropagation();}
  if(!confirm('종목 전체를 삭제할까요?'))return;
  const data=getData().filter(s=>s.id!==sid);
  saveData(data);
  renderStocks();
  renderPortfolioChart(getData());
}
function editTargetAmt(sid){const v=prompt('목표 투자금액 (원):');if(!v)return;const data=getData();const s=data.find(x=>x.id===sid);if(!s)return;s.targetAmount=Number(v.replace(/,/g,''));saveData(data);renderStocks();}
function editLevels(sid){
  const data=getData();const s=data.find(x=>x.id===sid);if(!s)return;
  const avg=calcAvgPrice(s.buys);
  const curTpct=s.targetPct||(s.targetPrice&&avg?((s.targetPrice-avg)/avg*100).toFixed(1):'');
  const curSpct=s.stopPct||(s.stopLoss&&avg?((avg-s.stopLoss)/avg*100).toFixed(1):'');
  const tp=prompt('목표 수익률 % (현재: '+(curTpct||'없음')+'%)', curTpct||'');
  if(tp!==null){
    s.targetPct=tp?Number(tp):0;
    s.targetPrice=tp&&avg?avg*(1+Number(tp)/100):'';
  }
  const sl=prompt('손절 하락률 % (현재: '+(curSpct||'없음')+'%)', curSpct||'');
  if(sl!==null){
    s.stopPct=sl?Number(sl):0;
    s.stopLoss=sl&&avg?avg*(1-Number(sl)/100):'';
  }
  saveData(data);renderStocks();
}
function editReason(sid){
  const data=getData();const s=data.find(x=>x.id===sid);if(!s)return;
  const r=prompt('투자 이유/메모:', s.reason||'');
  if(r!==null){s.reason=r;saveData(data);renderStocks();}
}
function renderPriceCell(s){

function saveKRPrice(sid,price){

function toggleCard(sid){document.getElementById('card-'+sid).classList.toggle('expanded');}

// ─── Render stock cards ───────────────────────────────────────
function renderStocks(){try{
  const allData=getData();
  const nowMonth=new Date().getMonth()+1;
  let data;
  if(currentMonth===nowMonth){
    // 현재 달: 이번 달 종목 + 이전 달 보유중인 종목 자동 이월
    data=allData.filter(s=>
      s.month===currentMonth ||
      (s.month<currentMonth && s.buys.some(b=>!b.sellPrice))
    );
  }else{
    // 과거 달: 해당 달 종목만
    data=allData.filter(s=>s.month===currentMonth);
  }
  const container=document.getElementById('stocks-container');
  if(!data.length){container.innerHTML=`<div class="empty"><span class="empty-icon">📋</span>종목이 없습니다.<br>+ 종목 추가 버튼으로 시작하세요.</div>`;return;}
  container.innerHTML=data.map(s=>renderCard(s)).join('');
}catch(e){console.error('renderStocks error:',e);}}

function renderCard(s){
  const avg=calcAvgPrice(s.buys);
  const inv=calcTotalInvested(s.buys);
  // 보유 주수
  const shares=s.buys.filter(b=>!b.sellPrice).reduce((sum,b)=>sum+(b.qty||b.amount/b.price),0);
  // 평가금: qty × 현재가 × 환율(KR은 1)
  const val=s.currentPrice?s.buys.filter(b=>!b.sellPrice).reduce((sum,b)=>{
    const q=b.qty||(b.amount/b.price);
    const r=s.market==='KR'?1:(b.rate||1380);
    return sum+q*Number(s.currentPrice)*r;
  },0):null;
  const unreal=val!==null?val-inv:null;
  // 수익률%: 가격 기준(통화 무관)
  const unrealPct=avg&&s.currentPrice?(Number(s.currentPrice)-avg)/avg*100:null;
  // 실현손익: qty × (매도가-매수가) × 환율
  const realPnl=s.buys.filter(b=>b.sellPrice).reduce((sum,b)=>{
    const q=b.qty||(b.amount/b.price);
    const r=s.market==='KR'?1:(b.rate||1380);
    return sum+q*(Number(b.sellPrice)-b.price)*r;
  },0);
  const target=s.targetAmount||0;
  const pct=target?Math.min(inv/target*100,150):0;
  const allClosed=s.buys.every(b=>b.sellPrice);

  // Price level alerts
  const atTarget=s.targetPrice&&s.currentPrice&&Number(s.currentPrice)>=Number(s.targetPrice);
  const atStop=s.stopLoss&&s.currentPrice&&Number(s.currentPrice)<=Number(s.stopLoss);
  const nearTarget=!atTarget&&s.targetPrice&&s.currentPrice&&avg&&((Number(s.targetPrice)-Number(s.currentPrice))/Number(s.currentPrice)*100)<5;
  const nearStop=!atStop&&s.stopLoss&&s.currentPrice&&((Number(s.currentPrice)-Number(s.stopLoss))/Number(s.currentPrice)*100)<5;
  let alertBadge='';
  if(atTarget) alertBadge='<span class="badge badge-target">🎯 목표가</span>';
  else if(atStop) alertBadge='<span class="badge badge-stop">⚠️ 손절가</span>';
  else if(nearTarget) alertBadge='<span class="badge badge-near-target">↑ 목표가 근접</span>';
  else if(nearStop) alertBadge='<span class="badge badge-near-stop">↓ 손절가 근접</span>';

  const statusBadge=allClosed?(realPnl>=0?'<span class="badge badge-win">청산+수익</span>':'<span class="badge badge-loss">청산+손실</span>'):'<span class="badge badge-hold">보유중</span>';

  const buysHTML=s.buys.map((b,i)=>{
    const bShares=b.qty||(b.amount/b.price);
    const bRate=s.market==='KR'?1:(b.rate||1380);
    const curVal=s.currentPrice&&!b.sellPrice?bShares*Number(s.currentPrice)*bRate:null;
    const pnlAmt=b.sellPrice?bShares*(Number(b.sellPrice)-b.price)*bRate:(curVal!==null?curVal-b.amount:null);
    const pnlPct=b.sellPrice?(Number(b.sellPrice)-b.price)/b.price*100:(s.currentPrice&&!b.sellPrice?(Number(s.currentPrice)-b.price)/b.price*100:null);
    const tw=target?(b.amount/target*100):null;
    const isSold=!!b.sellPrice;
    const days=daysBetween(b.date,b.sellDate||null);
    return `<tr>
      <td class="mono" style="color:var(--text3)">${i+1}차</td>
      <td class="mono">${b.date}</td>
      <td class="mono">${fmtPrice(b.price,s.market||'US')}</td>
      <td class="mono">${b.qty?b.qty.toLocaleString()+'주':'-'}</td>
      <td class="mono">${fmtMoneyAbs(b.amount)}</td>
      <td class="mono">${tw!==null?tw.toFixed(1)+'%':'-'}</td>
      <td class="${curVal!==null?(curVal>=b.amount?'pos':'neg'):''} mono">${isSold?'-':(curVal!==null?fmtMoneyAbs(curVal):'미조회')}</td>
      <td class="mono">${b.sellPrice?fmtPrice(b.sellPrice,s.market||'US'):'<span style="color:var(--text3)">-</span>'}</td>
      <td class="mono">${b.sellDate||'<span style="color:var(--text3)">-</span>'}</td>
      <td class="${pnlAmt!==null?(pnlAmt>=0?'pos':'neg'):''} mono">${pnlAmt!==null?fmtMoney(pnlAmt):'-'}</td>
      <td class="${pnlPct!==null?(pnlPct>=0?'pos':'neg'):''}">${fmtPct(pnlPct)}</td>
      <td class="mono">${days!==null?days+'일':(isSold?'-':daysBetween(b.date)+'일')}</td>
      <td style="color:var(--text2);font-size:11px;max-width:90px;overflow:hidden;text-overflow:ellipsis">${b.memo||''}</td>
      <td style="display:flex;gap:4px;align-items:center;">
        ${!isSold?`<button class="btn btn-ghost" style="padding:3px 8px;font-size:10px" onclick="openSell('${s.id}','${b.id}')">매도</button>`:''}
        <button class="btn-del" onclick="deleteBuy('${s.id}','${b.id}')">✕</button>
      </td>
    </tr>
    <tr id="sell-${s.id}-${b.id}" style="display:none;background:var(--bg);">
      <td colspan="14" style="padding:10px 14px;">
        <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
          <div class="ff"><label>${s.market==='KR'?'매도가 (원)':'매도가 ($)'}</label><input type="number" id="sp-${s.id}-${b.id}" placeholder="${s.market==='KR'?'0':'0.00'}" step="${s.market==='KR'?'1':'0.01'}" style="width:130px"></div>
          <div class="ff"><label>매도일</label><input type="date" id="sd-${s.id}-${b.id}" style="width:140px"></div>
          <button class="btn-save" onclick="saveSell('${s.id}','${b.id}')">저장</button>
          <button class="btn-cancel-sm" onclick="openSell('${s.id}','${b.id}')">취소</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  const levelsHTML=[];
  if(s.targetPrice) levelsHTML.push('<div class="level-item"><div class="level-dot" style="background:var(--green)"></div><span style="color:var(--text3)">목표가</span><span class="mono" style="color:var(--green)">'+fmtPrice(s.targetPrice,s.market||'US')+(s.targetPct?' <span style="font-size:10px;color:var(--green);opacity:.7">(+'+s.targetPct+'%)</span>':'')+'</span></div>');
  if(s.stopLoss) levelsHTML.push('<div class="level-item"><div class="level-dot" style="background:var(--red)"></div><span style="color:var(--text3)">손절가</span><span class="mono" style="color:var(--red)">'+fmtPrice(s.stopLoss,s.market||'US')+(s.stopPct?' <span style="font-size:10px;color:var(--red);opacity:.7">(-'+s.stopPct+'%)</span>':'')+'</span></div>');

  return `
<div class="stock-card" id="card-${s.id}">
  <div class="card-header" onclick="toggleCard('${s.id}')">
    <div>
      <div class="card-ticker">${s.stockName||s.ticker}</div>
      <div class="card-ticker-sub">${s.stockName?s.ticker+' · ':''} ${s.buys.length}회차 매수${s.month!==currentMonth?' <span style="background:var(--amber-bg);color:var(--amber);font-size:9px;padding:1px 5px;border-radius:3px;margin-left:4px">'+s.month+'월 매수</span>':''}</div>
    </div>
    <div class="card-meta">
      <div class="meta-item">
        <span class="meta-label">평단가</span>
        <span class="meta-value">${avg?fmtPrice(avg,s.market||'US'):'-'}</span>
      </div>
      ${renderPriceCell(s)}
      <div class="meta-item">
        <span class="meta-label">미실현 손익</span>
        <span class="meta-value ${unreal!==null?(unreal>=0?'pos':'neg'):''}">${unreal!==null?fmtMoney(unreal)+' ('+fmtPct(unrealPct)+')':'-'}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">실현 손익</span>
        <span class="meta-value ${realPnl>0?'pos':realPnl<0?'neg':''}">${realPnl!==0?fmtMoney(realPnl):'-'}</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-label">
          <span>목표 비중</span>
          <span>${fmtMoneyAbs(inv)} / ${fmtMoneyAbs(target)}</span>
        </div>
        <div class="progress-track"><div class="progress-fill ${pct>100?'over':''}" style="width:${Math.min(pct,100)}%"></div></div>
        <div style="font-family:var(--mono);font-size:9px;color:${pct>100?'var(--amber)':'var(--text3)'};margin-top:3px">${pct.toFixed(0)}% 채움</div>
      </div>
    </div>
    <div class="card-right">
      ${alertBadge}
      ${statusBadge}
      <span class="chevron">▾</span>
    </div>
  </div>

  <div class="card-detail">
    <div class="detail-toolbar">
      <span class="detail-title">매수 내역 (${s.buys.length}회차)</span>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-green" style="padding:5px 11px;font-size:11px" onclick="openAddBuy('${s.id}')">＋ 추가매수</button>
        <button class="btn btn-ghost" style="padding:5px 11px;font-size:11px" onclick="editLevels('${s.id}')">목표/손절가 수정</button>
        <button class="btn btn-ghost" style="padding:5px 11px;font-size:11px" onclick="editTargetAmt('${s.id}')">목표금액 수정</button>
        <button class="btn btn-ghost" style="padding:5px 11px;font-size:11px" onclick="editReason('${s.id}')">투자이유 수정</button>
        <button class="btn btn-danger" style="padding:5px 11px;font-size:11px" onclick="deleteStock('${s.id}',event)">종목 삭제</button>
      </div>
    </div>
    ${levelsHTML.length?`<div class="levels-row">${levelsHTML.join('')}</div>`:''}
    ${s.reason?`<div class="reason-box"><div class="reason-label">투자 이유</div>${s.reason}</div>`:''}
    <div style="overflow-x:auto">
    <table>
      <thead><tr><th>회차</th><th>매수일</th><th>매수가</th><th>수량</th><th>매수금액</th><th>목표비중</th><th>평가금액</th><th>매도가</th><th>매도일</th><th>손익금액</th><th>수익률</th><th>보유일</th><th>메모</th><th></th></tr></thead>
      <tbody>${buysHTML}</tbody>
    </table>
    </div>
    <div class="add-buy-form" id="abf-${s.id}">
      <div style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">추가 매수</div>
      <div class="form-row">
        <div class="ff"><label>매수일</label><input type="date" data-field="date" style="width:148px"></div>
        <div class="ff"><label>${s.market==='KR'?'매수가 (원)':'매수가 ($)'}</label><input type="number" data-field="price" placeholder="${s.market==='KR'?'0':'0.00'}" step="${s.market==='KR'?'1':'0.01'}" style="width:120px" oninput="calcAbfAmt('${s.id}')"></div>
        <div class="ff"><label>수량 (주)</label><input type="number" data-field="qty" placeholder="10" step="1" min="1" style="width:100px" oninput="calcAbfAmt('${s.id}')"></div>
        ${s.market!=='KR'?'<div class="ff"><label>환율 (원/$)</label><input type="number" data-field="rate" placeholder="1380" step="1" value="1380" style="width:100px"></div>':''}
        <div class="ff"><label>매수금액</label><div id="abf-amt-${s.id}" style="font-family:var(--mono);font-size:12px;padding:8px 10px;border:1px solid var(--border);border-radius:5px;color:var(--text2);background:var(--surface2);width:130px">-</div></div>
        <div class="ff"><label>메모</label><input type="text" data-field="memo" placeholder="선택사항" style="width:140px"></div>
        <div style="display:flex;gap:6px;align-self:flex-end">
          <button class="btn-cancel-sm" onclick="openAddBuy('${s.id}')">취소</button>
          <button class="btn-save" onclick="saveAddBuy('${s.id}')">저장</button>
        </div>
      </div>
    </div>
  </div>
</div>`;
}

// ─── Summary + Chart ──────────────────────────────────────────
function renderSummary(){
  const data=getData();
  const monthlyPnl=Array(12).fill(0);
  for(const s of data){
    for(const b of s.buys.filter(b=>b.sellPrice)){
      const sh=b.amount/b.price;
      monthlyPnl[s.month-1]+=sh*(Number(b.sellPrice)-b.price);
    }
  }

  if(typeof Chart==='undefined'){return;}
  try{if(chartInst)chartInst.destroy();}catch(e){}
  const chartCanvas=document.getElementById('monthly-chart');
  if(!chartCanvas)return;
  const ctx=chartCanvas.getContext('2d');
  chartInst=new Chart(ctx,{
    type:'bar',
    data:{
      labels:MONTHS,
      datasets:[{
        data:monthlyPnl,
        backgroundColor:monthlyPnl.map(v=>v>=0?'rgba(34,201,122,0.2)':'rgba(240,90,90,0.2)'),
        borderColor:monthlyPnl.map(v=>v>=0?'#22c97a':'#f05a5a'),
        borderWidth:1.5,
        borderRadius:4,
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const v=ctx.raw;return ' '+(v>=0?'+':'')+Math.round(v).toLocaleString('ko-KR')+'원';}}}},
      scales:{
        x:{grid:{color:'#252a38'},ticks:{color:'#8890a8',font:{family:'DM Mono',size:11}}},
        y:{grid:{color:'#252a38'},ticks:{color:'#8890a8',font:{family:'DM Mono',size:11},callback:v=>(v>=0?'+':'')+Math.round(v/10000).toLocaleString('ko-KR')+'만'}}
      }
    }
  });

  document.getElementById('summary-body').innerHTML=MONTHS.map((label,i)=>{
    const mon=i+1;
    const mS=data.filter(s=>s.month===mon);
    const mB=mS.flatMap(s=>s.buys);
    const mC=mB.filter(b=>b.sellPrice);
    const mW=mC.filter(b=>Number(b.sellPrice)>=b.price);
    const mL=mC.filter(b=>Number(b.sellPrice)<b.price);
    const mRate=mC.length?Math.round(mW.length/mC.length*100):null;
    const mPnl=mC.reduce((s,b)=>{const sh=b.amount/b.price;return s+sh*(Number(b.sellPrice)-b.price);},0);
    const mAvgW=mW.length?mW.reduce((s,b)=>(Number(b.sellPrice)-b.price)/b.price*100+s,0)/mW.length:null;
    const mAvgL=mL.length?mL.reduce((s,b)=>(Number(b.sellPrice)-b.price)/b.price*100+s,0)/mL.length:null;
    const totBuy=mB.reduce((s,b)=>s+b.amount,0);
    const empty=!mS.length;
    return `<tr style="${empty?'opacity:.3':''}">
      <td style="font-weight:500">${label}</td>
      <td class="mono">${mS.length||'-'}</td>
      <td class="mono">${totBuy?fmtMoneyAbs(totBuy):'-'}</td>
      <td class="mono">${mC.length?mW.length+' / '+mL.length:'-'}</td>
      <td class="${mRate!==null?(mRate>=50?'pos':'neg'):''}">${mRate!==null?mRate+'%':'-'}</td>
      <td class="${mAvgW!==null?'pos':''}">${mAvgW!==null?'+'+mAvgW.toFixed(2)+'%':'-'}</td>
      <td class="${mAvgL!==null?'neg':''}">${mAvgL!==null?mAvgL.toFixed(2)+'%':'-'}</td>
      <td class="${mC.length?(mPnl>=0?'pos':'neg'):''}">${mC.length?fmtMoney(mPnl):'-'}</td>
    </tr>`;
  }).join('');
}

// ─── Page nav ─────────────────────────────────────────────────
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  try{
    if(name==='summary') renderSummary();
    if(name==='portfolio') renderPortfolio();
    if(name==='log') renderStocks();
  }catch(e){console.error('showPage error:',name,e);}
}

// ─── Init ─────────────────────────────────────────────────────
function init(){
  renderMonthTabs();
  renderStocks();
  renderPortfolio();
  // KR 현재가 입력 이벤트 위임
  document.addEventListener('change',function(e){
    if(e.target.classList.contains('kr-price-input')){
      saveKRPrice(e.target.dataset.sid, e.target.value);
    }
  });
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}
</script>
